<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>RL Tracker</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-SgOJa3DmI69IUzQ2PVdRZhwQ+dy64/BUtbMJw1MZ8t5HZApcHrRKUc4W0kG879m7" crossorigin="anonymous">
    <script src="https://kit.fontawesome.com/2a85839126.js" crossorigin="anonymous"></script>
</head>

<body>

    <!-- Main display -->
    <div class="container">
        <div class="row">
            <div class="col-12">
                <h1 class="text-center text-primary fw-bold mt-3">RL TRACKER</h1>
                <!-- Menu dropdown-->
                <div class="dropdown position-absolute top-0 end-0 mt-2 me-2">
                    <button class="btn btn-outline-secondary" type="button" data-bs-toggle="dropdown" aria-expanded="false" aria-label="Expand dropdown">
                        <i class="fa-solid fa-bars"></i>
                    </button>
                    <ul class="dropdown-menu">
                        <li>
                            <!-- Refresh button -->
                            <a id="refresh" class="dropdown-item" href="shortcuts://run-shortcut?name=RL%20Tracker">
                                <i class="fa-solid fa-rotate-right me-1"></i>
                                Refresh
                            </a>
                        </li>
                        <li>
                            <!-- Search button -->
                            <button id="search" type="button" class="dropdown-item" data-bs-toggle="modal" data-bs-target="#searchModal">
                                <i class="fa-solid fa-magnifying-glass me-1"></i>
                                Search
                            </button>
                        </li>
                        <li>
                            <!-- Light/Dark mode toggle -->
                            <button id="themeToggle" type="button" class="dropdown-item" onclick="toggleTheme()" disabled>
                                <i class="fa-solid fa-moon me-1"></i>
                                <span class="text-capitalize">Dark</span>
                                Mode
                            </button>
                        </li>
                    </ul>
                </div>
            </div>
            <div class="col-12">
                <hr class="mt-0 mb-1">
            </div>
        </div>
        <div class="row px-2">
            <div class="col-12">
                <!-- Profile nav -->
                <ul class="nav nav-underline" id="profileNav" role="tablist"></ul>
            </div>
            <div class="col-12">
                <hr class="mt-2 mb-0">
            </div>
            <div class="col-12">
                <ul class="nav nav-underline mb-2" id="profileViewNav" role="tablist">
                    <li class="nav-item" role="presentation">
                        <button class="playlistsTab nav-link text-light fs-5 py-0 active" data-bs-toggle="tab" type="button" role="tab" onclick="showView('playlistsView')">Playlists</button>
                    </li>
                    <li class="nav-item" role="presentation">
                        <button class="peaksTab nav-link text-light fs-5 py-0" data-bs-toggle="tab" type="button" role="tab" onclick="showView('peaksView')">Peaks</button>
                    </li>
                    <li class="nav-item" role="presentation">
                        <button class="lifetimeTab nav-link text-light fs-5 py-0" data-bs-toggle="tab" type="button" role="tab" onclick="showView('lifetimeView')">Lifetime</button>
                    </li>
                    <li class="nav-item" role="presentation">
                        <button class="historyTab nav-link text-secondary fs-5 py-0" data-bs-toggle="tab" type="button" role="tab" onclick="showView('historyView')" disabled>History</button>
                    </li>
                </ul>
            </div>

            <!-- Profile tab panes -->
            <div class="tab-content" id="profileTabContent"></div>
        </div>
    </div>

    <!-- Search modal -->
    <div id="searchModal" class="modal pt-5" tabindex="-1">
        <div class="modal-dialog mt-3">
            <div class="modal-content">
                <div class="modal-body">
                    <form id="searchForm">
                        <div class="input-group">
                            <div class="form-floating">
                                <input type="text" id="searchInput" name="text" class="form-control border-secondary border-end-0" role="search" placeholder="Username" autocomplete="off" required>
                                <label class="text-info" for="search">Username</label>
                            </div>

                            <button type="reset" class="btn btn-outline-secondary border-start-0 border-end-0" aria-label="Clear input" onclick="document.getElementById('searchInput').focus();">
                                <i class="fa-solid fa-x text-info"></i>
                            </button>
                            <button type="submit" class="btn btn-outline-secondary border-start-0" aria-label="Search for username">
                                <i class="fa-solid fa-magnifying-glass text-info"></i>
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Profile nav item template -->
    <template id="profileNavItemTemplate">
        <li class="nav-item" role="presentation">
            <button class="nav-link text-info fs-5 py-0" id="template-tab" data-bs-toggle="tab" data-bs-target="#template-tab-pane" type="button" role="tab">Username</button>
        </li>
    </template>

    <!-- Profile tab pane template -->
    <template id="profileTabPaneTemplate">
        <div class="tab-pane" id="template-tab-pane" role="tabpanel" tabindex="0">

            <!-- Last updated -->
            <i class="text-secondary-emphasis">Last Updated: </i><i class="lastUpdated text-secondary-emphasis">00/00/00, 00:00 AM</i>

            <div class="viewNavContent tab-content">
                <div class="playlistsView tab-pane show active" role="tabpanel" tabindex="0">
                    <!-- Playlist stats -->
                    <ul id="playlistStats" class="list-group col-12 mt-2 p-0"></ul>
                </div>
                <div class="peaksView tab-pane" role="tabpanel" tabindex="0">
                    <!-- Peaks stats -->
                    <ul id="peakStats" class="list-group col-12 mt-2 p-0"></ul>
                </div>
                <div class="lifetimeView tab-pane" role="tabpanel" tabindex="0">
                    <!-- Lifetime stats -->
                    <ul id="lifetimeStats" class="list-group col-12 mt-2 p-0"></ul>
                </div>
                <div class="historyView tab-pane" role="tabpanel" tabindex="0"></div>
            </div>

        </div>
    </template>

    <!-- Playlist stat group template -->
    <template id="playlistStatGroupTemplate">
        <li class="list-group-item border-secondary fw-bold text-nowrap">
            <div class="row px-2">
                <div class="playlistName col-6 p-0">
                    Playlist Name
                </div>
                <div class="col-3 p-0">
                    <img class="ratingIcon img-fluid col-4 ms-3" src="https://trackercdn.com/cdn/tracker.gg/rocket-league/ranks/s4-0.png" alt="Rating icon">
                    <span class="tierDiv text-warning align-middle me-1">0-0</span>
                </div>
                <div class="col-3 text-end p-0">
                    <span class="mmrValue badge bg-secondary">
                        0000
                    </span>
                </div>
            </div>
        </li>
    </template>

    <!-- Lifetime stat group template -->
    <template id="lifetimeStatGroupTemplate">
        <li class="list-group-item border-secondary fw-bold text-nowrap">
            <div class="row px-2">
                <div class="statName col-6 p-0">
                    Stat Name
                </div>
                <div class="col-6 text-end p-0">
                    <span class="statValue badge bg-secondary">
                        ----
                    </span>
                    <img class="statIcon col-2 img-fluid" src="https://trackercdn.com/cdn/tracker.gg/rocket-league/ranks/s4-0.png" alt="Stat icon">
                </div>
            </div>
        </li>
    </template>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/js/bootstrap.bundle.min.js" integrity="sha384-k6d4wzSIapyDyv1kpU366/PK5hCdSbCRGRCMv+eplOQJWyd1fbcAu9OCUj5zNLiq" crossorigin="anonymous"></script>
    <script src="script.js"></script>
</body>

</html>
